name: Build Android APK

on:
  schedule:
    - cron: '0 */8 * * *'   # every 8 hours at minute 0
  workflow_dispatch:          # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this CI repo
        uses: actions/checkout@v4
        with:
          path: ci-repo

      - name: Checkout OpenClaw source
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          path: source
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 33
          ndk: '25.2.9519653'
          cache: true

      - name: Build APK
        working-directory: source/apps/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-debug-apk
          path: source/apps/android/app/build/outputs/apk/debug/*.apk

      - name: Create GitHub Release (optional)
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          tag_name: apk-${{ github.run_id }}
          name: Android APK Build ${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          tag_name: apk-${{ github.run_id }}
          files: source/apps/android/app/build/outputs/apk/debug/*.apk
